<!DOCTYPE html>
<html>
<head>
    <title>Jennie's WebSocket Tester 💖</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #ffe6e6; }
        #messages { background: white; padding: 10px; height: 300px; overflow-y: scroll; border: 2px solid #ff99cc; border-radius: 10px; }
        input, button { padding: 8px; margin: 5px; border-radius: 5px; border: 1px solid #ff99cc; }
        button { background-color: #ff99cc; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>🎀 Jennie's Live Game Viewer 🎀</h2>
    
    <input type="text" id="gameId" placeholder="Paste game_id here!" size="40">
    <button onclick="connect()">Connect to Game!</button>
    <button onclick="disconnect()">Disconnect</button>

    <h3>Live Updates:</h3>
    <div id="messages"></div>

    <script>
        let ws;
        function connect() {
            const gameId = document.getElementById("gameId").value;
            if (!gameId) return alert("Jennie needs a game_id first, silly! 🤭");
            
            // Connect to your FastAPI WebSocket endpoint!
            ws = new WebSocket(`ws://localhost:8000/ws/game/${gameId}`);
            
            ws.onopen = () => log("💖 Connected! Jennie is listening...");
            ws.onmessage = (event) => log("📩 NEW RESULT: " + event.data);
            ws.onclose = () => log("💔 Disconnected.");
        }

        function disconnect() {
            if (ws) ws.close();
        }

        function log(msg) {
            const messages = document.getElementById("messages");
            const newMsg = document.createElement("div");
            newMsg.innerText = msg;
            messages.appendChild(newMsg);
        }
    </script>
</body>
</html>
